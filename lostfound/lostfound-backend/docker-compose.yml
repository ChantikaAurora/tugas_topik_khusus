version: "3.8"

services:
  mongodb:
    image: mongo:7
    container_name: lostfound-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    container_name: lostfound-es
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - es-data:/usr/share/elasticsearch/data

  redis:
    image: redis:7-alpine
    container_name: lostfound-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: lostfound-api
    ports:
      - "8000:8000"
    environment:
      - MONGO_URI=mongodb://mongodb:27017
      - ES_URL=http://elasticsearch:9200
      - REDIS_URL=redis://redis:6379
      # PENTING: ganti secret ini untuk production, jangan pakai nilai contoh ini
      - JWT_SECRET_KEY=ganti-dengan-secret-key-yang-panjang-dan-acak
    depends_on:
      - mongodb
      - elasticsearch
      - redis

  search-worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: lostfound-search-worker
    environment:
      - MONGO_URI=mongodb://mongodb:27017
      - ES_URL=http://elasticsearch:9200
      - REDIS_URL=redis://redis:6379
    depends_on:
      - mongodb
      - elasticsearch
      - redis

  notification-worker:
    build:
      context: .
      dockerfile: Dockerfile.notification
    container_name: lostfound-notification-worker
    environment:
      - MONGO_URI=mongodb://mongodb:27017
      - REDIS_URL=redis://redis:6379
      - FIREBASE_CREDENTIALS_PATH=/app/firebase-service-account.json
    volumes:
      # Taruh file kredensial Firebase kamu di folder ini sebelum docker compose up.
      # Lihat komentar di app/firebase_client.py untuk cara mendapatkannya.
      - ./firebase-service-account.json:/app/firebase-service-account.json:ro
    depends_on:
      - redis
      - mongodb

volumes:
  mongo-data:
  es-data:
  redis-data:
